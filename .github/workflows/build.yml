name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release on tag push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          # Gradle 4.9 doesn't play with setup-java's built-in 'gradle' cache;
          # cache manually instead.

      - name: Cache Gradle user home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('ci/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up MDK workspace
        run: ./ci/setup-mdk.sh mdk

      - name: Compute mod version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0+${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Build + test
        working-directory: mdk
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon -PmodVersion=${{ steps.version.outputs.version }} test build

      - name: Upload jar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selectivekeepinv-${{ steps.version.outputs.version }}
          path: mdk/build/libs/*.jar
          if-no-files-found: warn

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: mdk/build/reports/tests/test/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mdk/build/libs/*.jar
          tag_name: ${{ github.ref_name }}
          name: Selective Keep Inventory ${{ github.ref_name }}
          generate_release_notes: true
